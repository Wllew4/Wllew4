name: update

on:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update_readme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Remake readme
      run: |
        pip install PyGithub
        python src/main.py ${{ secrets.ACCESS_TOKEN }}
    - name: Push
      run: |
        git config user.name Wllew4
        git config user.email Wllew4@users.noreply.github.com
        git commit -am "Readme auto-updated" --allow-empty
        git push
